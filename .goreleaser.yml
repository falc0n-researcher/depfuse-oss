version: 2

before:
  hooks:
    - go mod tidy
    - go fmt ./...

builds:
  - id: depfuse
    main: ./cmd/depfuse
    binary: depfuse
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/falc0n-researcher/depfuse-oss/internal/version.Version={{.Version}}
      - -X github.com/falc0n-researcher/depfuse-oss/internal/version.Commit={{.Commit}}
      - -X github.com/falc0n-researcher/depfuse-oss/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
